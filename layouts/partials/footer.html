<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-brand">
      <p class="footer-logo">Perceptum</p>
      <p class="footer-tagline">{{ .Site.Params.tagline }}</p>
    </div>
    <div class="footer-contact">
      <p><a href="tel:+31712032103">{{ .Site.Params.phone }}</a></p>
      <p><a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a></p>
      <p>Noordwijk · Amsterdam · Leiden</p>
    </div>
    <div class="footer-copy">
      <p>&copy; {{ now.Year }} Perceptum. Alle rechten voorbehouden.</p>
    </div>
  </div>
</footer>

<!-- Chatbot widget placeholder -->
<div id="perceptum-chat" class="chat-widget" style="display:none;">
  <!-- Integration point for chatbot widget. Replace with actual chatbot script. -->
</div>
<script>
  // Mobile nav toggle
  document.querySelector('.nav-toggle')?.addEventListener('click', function() {
    document.querySelector('.nav-menu')?.classList.toggle('open');
  });
</script>
