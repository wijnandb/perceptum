{{ define "main" }}
<section class="page-content">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ if not .Content }}
    {{ range .Pages }}
    <article class="post-card">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      {{ if .Date }}<time class="post-date">{{ .Date.Format "2 January 2006" }}</time>{{ end }}
      {{ if .Summary }}<p>{{ .Summary }}</p>{{ end }}
    </article>
    {{ end }}
    {{ end }}
  </div>
</section>
{{ end }}
